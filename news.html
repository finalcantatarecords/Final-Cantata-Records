<!DOCTYPE html>
<html>
<head>
    <title>Memorex</title>

    <style>
@font-face {
    font-family: "OldEnglishBoots";
    src: url("Old_Englished_Boots.ttf")
        format("truetype");
    font-weight: normal;
    font-style: normal;
}
@font-face {
    font-family: "Seagram";
    src: url("Seagram-tfb.ttf")
        format("truetype");
    font-weight: normal;
    font-style: normal;
}
        
        body {
            margin: 0;
            font-family: "OldEnglishBoots", Arial, sans-serif;

            background-image: url("assets/sotnbg2.png");
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            background-color: black;

            margin: 0;
            color: white   
        }

        header {
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        section {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.80);
            color: white;
            padding: 20px;
        }

        h1 {
            font-family: "Seagram", Arial, sans-serif;
            color: silver;
            font-size: 72px;
        }
        h2 {
            font-family: "OldEnglishBoots", Arial, sans-serif;
            font-size: 32px;
            color: #E6D8A8;
        }

        p {
            font-size: 24px !important;
            color: silver;
        }
        .band-logo {
            width: 100%;
            max-width: 1200px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .player-row {
            display: flex;
            gap: 20px;
        }

    .label-footer {
    text-align: center;
    margin: 40px 0 20px 0;
}

    .footer-logo {
    width: 80px;
    height: auto;
    cursor: pointer;
    opacity: 0.9;
    transition: 0.2s;
}

    .footer-logo:hover {
    opacity: 1;
    transform: scale(1.05);
}

.news-item {
  margin-bottom: 40px;
  padding: 20px;
  border-bottom: 1px solid #444;
}

.news-date {
  font-size: 22px;
  margin-bottom: 15px;
  color: #ccc;
}

/* THIS is the side-by-side layout */
.news-content {
  display: flex;
  gap: 20px;
  align-items: flex-start;
}

/* Text block */
.news-text {
  flex: 1;
  font-size: 16px;
  line-height: 1.5;
}

/* Image block */
.news-image {
  flex: 1;
}

.news-image img {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 8px;
  object-fit: cover;
}

/* Mobile responsiveness */
@media (max-width: 768px) {
  .news-content {
    flex-direction: column;
  }
}

<div class="news-item">
  
  <h2 class="news-date">12 June 2026</h2>

  <div class="news-content">
    
    <div class="news-text">
      <h3>Article Title Here</h3>
      <p>
        news
      </p>
    </div>

    <div class="news-image">
      <img src="rtc2026promohd.jpg" alt="Rye Town's Creatures">
    </div>

  </div>

</div>
